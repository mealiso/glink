<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPaste | Secure Sharing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #6366f1; --border: #27272a; --text: #fafafa; --text-dim: #a1a1aa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 1000px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 1.8rem; margin: 0; display: flex; align-items: center; gap: 12px; }
        .header p { color: var(--text-dim); margin: 8px 0 0; font-size: 0.95rem; }
        textarea { width: 100%; height: 380px; background: #0c0c0e; border: 1px solid var(--border); border-radius: 12px; color: #e4e4e7; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 14px; resize: none; transition: all 0.2s; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .footer-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        #resultBox { margin-top: 25px; display: none; background: #0c0c0e; border: 1px solid var(--accent); border-radius: 12px; padding: 15px; animation: slideUp 0.3s ease; }
        .url-wrapper { display: flex; gap: 10px; }
        .url-wrapper input { background: transparent; border: none; color: var(--accent); width: 100%; font-family: 'JetBrains Mono'; outline: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-ghost" style="color: var(--accent);"></i> GhostPaste</h1>
            <p>Temporary encrypted snippets. Self-destructs in 24 hours.</p>
        </div>
        <textarea id="noteInput" placeholder="Paste your code, logs, or notes here..."></textarea>
        <div class="footer-tools">
            <span style="font-size: 0.85rem; color: var(--text-dim);"><i class="fa-regular fa-clock"></i> Duration: 24h</span>
            <button id="genBtn" class="btn"><i class="fa-solid fa-link"></i> Generate Secure Link</button>
        </div>
        <div id="resultBox">
            <div class="url-wrapper">
                <input type="text" id="shareUrl" readonly>
                <button class="btn" style="padding: 8px 16px; font-size: 0.8rem;" onclick="copyUrl()">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
