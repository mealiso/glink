<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPaste Pro | Ultra-Modern Sharing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050509; --panel: #0b0b14; --accent: #7c3aed; --accent-glow: rgba(124, 58, 237, 0.3); --border: rgba(255, 255, 255, 0.06); --text: #e2e8f0; --text-dim: #94a3b8; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* Premium Background Gradient */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 10% 10%, #1e1b4b 0%, transparent 40%), radial-gradient(circle at 90% 90%, #2e1065 0%, transparent 40%); z-index: -1; }

        .app-panel { width: 100%; max-width: 1200px; background: var(--panel); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: grid; grid-template-columns: 1fr; gap: 30px; animation: panelIn 0.6s ease; }
        @keyframes panelIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; grid-column: 1 / -1; margin-bottom: 20px; }
        .header h1 { font-weight: 700; font-size: 2.8rem; margin: 0; background: linear-gradient(135deg, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .header p { color: var(--text-dim); margin-top: 10px; font-size: 1.1rem; }

        /* Main Grid Split */
        .content-split { display: grid; grid-template-columns: 2.5fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .content-split { grid-template-columns: 1fr; } }

        /* Text Area Panel */
        .text-panel { position: relative; }
        textarea { width: 100%; height: 450px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 16px; color: #fff; padding: 20px; font-family: 'Fira Code', monospace; font-size: 14px; resize: none; transition: 0.3s; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .char-count { position: absolute; bottom: 15px; right: 20px; font-size: 0.8rem; color: var(--text-dim); }

        /* Image Panel */
        .image-panel { background: rgba(0,0,0,0.15); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .image-panel h3 { margin: 0 0 10px; font-size: 1rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .img-input-wrap { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; padding: 5px 10px; }
        .img-input-wrap input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; outline: none; font-size: 0.85rem; }
        .img-preview-mini { width: 30px; height: 30px; border-radius: 6px; background: #1a1a2e; object-fit: cover; border: 1px solid var(--border); }

        /* Action Section */
        .action-area { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 16px 40px; border-radius: 14px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

        /* Result Panel (Glassmorphism) */
        #resultPanel { margin-top: 30px; display: none; width: 100%; max-width: 600px; background: rgba(124, 58, 237, 0.05); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 16px; padding: 20px; text-align: center; backdrop-filter: blur(5px); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .share-url { font-family: 'Fira Code', monospace; color: #a78bfa; background: transparent; border: none; width: 100%; text-align: center; font-size: 0.9rem; margin-bottom: 15px; outline: none; }
        .btn-secondary { background: none; border: 1px solid var(--accent); color: #a78bfa; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .btn-secondary:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="app-panel">
        <div class="header">
            <h1>GhostPaste Pro</h1>
            <p>Temporary, encrypted snippets with live image preview.</p>
        </div>

        <div class="content-split">
            <div class="text-panel">
                <textarea id="mainText" placeholder="// Paste your code, logs, or notes here..." oninput="updateCharCount()"></textarea>
                <span class="char-count" id="charCount">0 characters</span>
            </div>

            <div class="image-panel">
                <h3>Images (URLs)</h3>
                <script>
                    for(let i=1; i<=8; i++) {
                        document.write(`
                            <div class="img-input-wrap">
                                <img src="" id="prev_${i}" class="img-preview-mini" style="display:none;">
                                <div id="placeholder_${i}" class="img-preview-mini" style="display:block; display:flex; align-items:center; justify-content:center; color:#333;">${i}</div>
                                <input type="text" class="img-url-input" placeholder="Image URL ${i}" oninput="previewImage(${i}, this.value)">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="action-area">
            <button class="btn-primary" onclick="createPaste()"><i class="fa-solid fa-bolt"></i> Generate Secure Link</button>
            
            <div id="resultPanel">
                <p style="margin: 0 0 10px; font-size: 0.9rem; color: var(--text-dim);">Your link is ready (Expires in 24h):</p>
                <input type="text" id="finalUrl" class="share-url" readonly>
                <button class="btn-secondary" onclick="copyFinalLink()"><i class="fa-solid fa-copy"></i> Copy Link</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>

        <div id="resultBox">
            <div class="url-wrapper">
                <input type="text" id="shareUrl" readonly>
                <button class="btn" style="padding: 8px 16px; font-size: 0.8rem;" onclick="copyUrl()">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
